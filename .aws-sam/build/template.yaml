AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Poker Tools - Flask on Lambda (Lambda Web Adapter) + API Gateway REST
Parameters:
  Environment:
    Type: String
    AllowedValues:
    - dev
    - prod
    Default: dev
    Description: "\u30C7\u30D7\u30ED\u30A4\u5148\u306E\u74B0\u5883"
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
    - arm64
Resources:
  PokerToolsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: poker-tools-${Environment}
      PackageType: Image
      Environment:
        Variables:
          PORT: '8080'
          AWS_LWA_READINESS_CHECK_PATH: /
      Events:
        RootPath:
          Type: Api
          Properties:
            RestApiId:
              Ref: PokerToolsApi
            Path: /
            Method: ANY
        ProxyPath:
          Type: Api
          Properties:
            RestApiId:
              Ref: PokerToolsApi
            Path: /{proxy+}
            Method: ANY
      ImageUri: pokertoolsfunction:latest
    Metadata:
      DockerContext: /Users/hiro/Documents/03_python_apps/poker_tools
      DockerTag: latest
      Dockerfile: Dockerfile
      SamResourceId: PokerToolsFunction
  PokerToolsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/poker-tools-${Environment}
      RetentionInDays:
        Fn::If:
        - IsProd
        - 90
        - 14
  PokerToolsApi:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: poker-tools-api-${Environment}
      StageName:
        Ref: Environment
      EndpointConfiguration:
        Type: REGIONAL
Conditions:
  IsProd:
    Fn::Equals:
    - Ref: Environment
    - prod
Outputs:
  ApiEndpoint:
    Description: "API Gateway \u30A8\u30F3\u30C9\u30DD\u30A4\u30F3\u30C8 URL\uFF08\
      \u30B9\u30C6\u30FC\u30B8\u30D7\u30EC\u30D5\u30A3\u30C3\u30AF\u30B9\u3042\u308A\
      \uFF09"
    Value:
      Fn::Sub: https://${PokerToolsApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/
    Export:
      Name:
        Fn::Sub: poker-tools-${Environment}-api-endpoint
  LambdaFunctionArn:
    Description: "Lambda \u95A2\u6570 ARN"
    Value:
      Fn::GetAtt:
      - PokerToolsFunction
      - Arn
    Export:
      Name:
        Fn::Sub: poker-tools-${Environment}-function-arn
  LambdaFunctionName:
    Description: "Lambda \u95A2\u6570\u540D"
    Value:
      Ref: PokerToolsFunction
